global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
    metrics_path: /metrics

  - job_name: "app-go"
    static_configs:
      - targets: ["app-go:8080"]
    metrics_path: /health
    scrape_interval: 10s

  - job_name: "app-python"
    static_configs:
      - targets: ["app-python:8081"]
    metrics_path: /health
    scrape_interval: 10s
